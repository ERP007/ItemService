spring:
  application:
    name: itemService
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:item_service}}
    username: ${DB_USERNAME:item_service}
    password: ${DB_PASSWORD:item_service}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

springdoc:
  paths-to-match: /api/items/**
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

item:
  master-seed:
    enabled: ${ITEM_MASTER_SEED_ENABLED:true}
    location: ${ITEM_MASTER_SEED_LOCATION:classpath:data/items.csv}
