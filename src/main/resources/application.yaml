spring:
  application:
    name: itemService
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:item_service}}
    username: ${DB_USERNAME:item_service}
    password: ${DB_PASSWORD:item_service}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9001/realms/master}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:9001/realms/master/protocol/openid-connect/certs}

springdoc:
  paths-to-match: /items/**
  api-docs:
    path: /items/v3/api-docs
  swagger-ui:
    path: /items/swagger-ui.html
    url: /api/items/v3/api-docs
    config-url: /api/items/v3/api-docs/swagger-config
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha

item:
  master-seed:
    enabled: ${ITEM_MASTER_SEED_ENABLED:true}
    location: ${ITEM_MASTER_SEED_LOCATION:classpath:data/items.csv}

inventory:
  client:
    base-url: ${INVENTORY_SERVICE_BASE_URL:http://inventory-service:8080}
    connect-timeout: ${INVENTORY_CLIENT_CONNECT_TIMEOUT:2s}
    read-timeout: ${INVENTORY_CLIENT_READ_TIMEOUT:3s}
    retry-max-attempts: ${INVENTORY_CLIENT_RETRY_MAX_ATTEMPTS:2}
