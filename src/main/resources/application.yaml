spring:
  application:
    name: itemService
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:item_service}}
    username: ${DB_USERNAME:item_service}
    password: ${DB_PASSWORD:item_service}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9001/realms/master}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:9001/realms/master/protocol/openid-connect/certs}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    publisher-confirm-type: correlated
    publisher-returns: true

springdoc:
  paths-to-match: /items/**
  api-docs:
    path: /items/v3/api-docs
  swagger-ui:
    path: /items/swagger-ui.html
    url: /api/items/v3/api-docs
    config-url: /api/items/v3/api-docs/swagger-config
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha

item:
  master-seed:
    enabled: ${ITEM_MASTER_SEED_ENABLED:true}
    location: ${ITEM_MASTER_SEED_LOCATION:classpath:data/items.csv}

messaging:
  outbox:
    relay:
      enabled: ${OUTBOX_RELAY_ENABLED:true}
      batch-size: ${OUTBOX_RELAY_BATCH_SIZE:50}
      fixed-delay-ms: ${OUTBOX_RELAY_FIXED_DELAY_MS:2000}
      max-attempts: ${OUTBOX_RELAY_MAX_ATTEMPTS:10}
      retry-delay-seconds: ${OUTBOX_RELAY_RETRY_DELAY_SECONDS:30}
      confirm-timeout-ms: ${OUTBOX_RELAY_CONFIRM_TIMEOUT_MS:5000}
